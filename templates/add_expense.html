{% extends 'base.html' %}
{% block title %}Add Expense - Expense Tracker{% endblock %}

{% block content %}

<div class="page-header">
    <h1><i class="fas fa-plus-circle"></i> Add New Expense</h1>
    <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
        <i class="fas fa-arrow-left"></i> Back to Dashboard
    </a>
</div>

<div class="form-container">
    <form method="POST" action="{{ url_for('add_expense') }}">
        
        <!-- TITLE -->
        <div class="form-group">
            <label for="title">
                <i class="fas fa-pencil-alt"></i> Expense Title *
            </label>
            <input type="text" id="title" name="title" 
                   placeholder="e.g. Lunch, Bus ticket, Netflix..." 
                   required>
        </div>

        <!-- AMOUNT -->
        <div class="form-group">
            <label for="amount">
                <i class="fas fa-rupee-sign"></i> Amount (₹) *
            </label>
            <input type="number" id="amount" name="amount" 
                   placeholder="e.g. 250.00" 
                   step="0.01" min="0" required>
        </div>

        <!-- CATEGORY -->
        <div class="form-group">
            <label for="category">
                <i class="fas fa-tag"></i> Category *
            </label>
            <select id="category" name="category" required>
                <option value="" disabled selected>Select a category...</option>
                <option value="Food">🍔 Food</option>
                <option value="Transport">🚌 Transport</option>
                <option value="Shopping">🛍️ Shopping</option>
                <option value="Entertainment">🎬 Entertainment</option>
                <option value="Health">💊 Health</option>
                <option value="Education">📚 Education</option>
                <option value="Bills">💡 Bills</option>
                <option value="Travel">✈️ Travel</option>
                <option value="Other">📦 Other</option>
            </select>
        </div>

        <!-- DATE -->
        <div class="form-group">
            <label for="date">
                <i class="fas fa-calendar"></i> Date *
            </label>
            <input type="date" id="date" name="date" 
                   value="{{ today }}" required>
        </div>

        <!-- NOTES -->
        <div class="form-group">
            <label for="notes">
                <i class="fas fa-sticky-note"></i> Notes (Optional)
            </label>
            <textarea id="notes" name="notes" 
                      placeholder="Any extra details..."></textarea>
        </div>

        <!-- BUTTONS -->
        <div class="form-buttons">
            <button type="submit" class="btn btn-primary">
                <i class="fas fa-save"></i> Save Expense
            </button>
            <a href="{{ url_for('dashboard') }}" class="btn btn-secondary">
                <i class="fas fa-times"></i> Cancel
            </a>
        </div>

    </form>
</div>

{% endblock %}
